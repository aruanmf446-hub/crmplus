name: Inspecionar dependências do front-end

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/dependency-audit-temp.yml

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Gerar relatório
        shell: bash
        run: |
          npm ci
          npm audit --json > .github/dependency-audit-temp.json || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/dependency-audit-temp.json
          git commit -m "chore: record dependency audit [skip ci]" || true
          git push
