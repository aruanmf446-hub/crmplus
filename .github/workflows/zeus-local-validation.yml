          if anchor not in workspace_text:
            raise SystemExit('workspace insertion anchor not found')
          workspaces.write_text(workspace_text.replace(anchor, zeus, 1))
          PY

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validar projeto
        id: validate
        shell: bash
        run: |
          set +e
          LOG_FILE="zeus-local-validation.log"
          : > "$LOG_FILE"

          npm ci >> "$LOG_FILE" 2>&1
          INSTALL_CODE=$?

          if [ "$INSTALL_CODE" -eq 0 ]; then
            npm run lint >> "$LOG_FILE" 2>&1
            LINT_CODE=$?
          else
            LINT_CODE=99
          fi

          if [ "$INSTALL_CODE" -eq 0 ] && [ "$LINT_CODE" -eq 0 ]; then
            npm run build >> "$LOG_FILE" 2>&1
            BUILD_CODE=$?
          else
            BUILD_CODE=99
          fi

          if [ "$INSTALL_CODE" -eq 0 ] && [ "$LINT_CODE" -eq 0 ] && [ "$BUILD_CODE" -eq 0 ]; then
            RESULT="success"
          else
            RESULT="failure"
          fi

          {
            echo "ZEUS_LOCAL_VALIDATION=$RESULT"
            echo "SOURCE_COMMIT=$GITHUB_SHA"
            echo "NPM_CI_EXIT=$INSTALL_CODE"
            echo "LINT_EXIT=$LINT_CODE"
            echo "BUILD_EXIT=$BUILD_CODE"
            echo "VALIDATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            echo "LAST_LOG_LINES"
            tail -n 100 "$LOG_FILE"
          } > .github/zeus-local-validation.txt

          cat .github/zeus-local-validation.txt
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Registrar código e resultado
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/workspaces/phase-four/shared.tsx lib/workspaces.ts .github/zeus-local-validation.txt
          git commit -m "feat: finish Zeus and local company logo [skip ci]" || true
          git push

      - name: Falhar quando a validação reprovar
        if: steps.validate.outputs.result != 'success'
        run: exit 1
