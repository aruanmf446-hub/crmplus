name: Aplicar ajuste final dos seletores de QA

on:
  push:
    branches: ["main"]
    paths:
      - scripts/apply-final-qa-selector-fix.mjs
      - .github/workflows/apply-final-qa-selector-fix.yml

permissions:
  contents: write

concurrency:
  group: crmplus-final-qa-selector-maintenance
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Aplicar seletores finais
        run: node scripts/apply-final-qa-selector-fix.mjs
      - name: Validar código alterado
        run: |
          npm ci
          npm run lint
          npm run typecheck
      - name: Remover auxiliares e publicar ajuste
        run: |
          rm scripts/apply-final-qa-selector-fix.mjs
          rm .github/workflows/apply-final-qa-selector-fix.yml
          git config user.name "crmplus-maintenance"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Concluir seletores acessíveis do QA funcional"
          git push origin HEAD:main
