name: Polir e auditar aplicativos CRM Plus

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/polish-all-apps.yml

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Aplicar melhorias
        run: python scripts/polish_apps.py

      - name: Instalar dependências
        run: npm ci

      - name: Verificar TypeScript
        run: npm run lint

      - name: Gerar build
        run: npm run build

      - name: Auditar pendências estáticas
        shell: bash
        run: |
          INERT=$(rg -n 'onClick=\{\(\) => \{\s*\}\}|href="#"|TODO|FIXME' components/workspaces/phase-four app lib || true)
          COUNT=$(printf "%s" "$INERT" | sed '/^$/d' | wc -l)
          THEMES=$(python - <<'PY'
          from pathlib import Path
          slugs = ["atlas","artemis","ares","poseidon","pandora","hercules","zeus","alexandria","olympus","argus","hermes","athena","gaia","pegasus","titans"]
          text = Path("components/workspaces/phase-four/shared.tsx").read_text()
          print(sum(1 for slug in slugs if f"  {slug}: {{ nav:" in text))
          PY
          )
          {
            echo "APP_POLISH_VALIDATION=success"
            echo "NPM_CI_EXIT=0"
            echo "LINT_EXIT=0"
            echo "BUILD_EXIT=0"
            echo "THEMES_FOUND=$THEMES"
            echo "INERT_OR_TODO_PATTERNS=$COUNT"
            echo "VALIDATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "$INERT"
          } > .github/app-polish-validation.txt

      - name: Publicar melhorias no main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/workspaces/phase-four/shared.tsx components/workspaces/phase-four/VerticalBusinessApp.tsx components/workspaces/phase-four/VerticalBusinessApp.module.css .github/app-polish-validation.txt
          git commit -m "feat: close shared app gaps and polish local workflows [skip ci]"
          git push
