name: Polir e auditar aplicativos CRM Plus

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/polish-all-apps.yml

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Aplicar melhorias compartilhadas
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_exact(path: str, old: str, new: str):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"Trecho não encontrado em {path}: {old[:120]!r}")
              file.write_text(text.replace(old, new, 1))

          shared = "components/workspaces/phase-four/shared.tsx"
          replace_exact(shared,
          '''  zeus: { nav: "#102f28", navRaised: "#17443a", selection: "#edf8f4", selectionStrong: "#d8f0e8", result: "#f7fcfa", resultRaised: "#e4f5ef", canvas: "#f1f6f4", topbar: "#fbfefd", data: "#ffffff" },
};''',
          '''  zeus: { nav: "#102f28", navRaised: "#17443a", selection: "#edf8f4", selectionStrong: "#d8f0e8", result: "#f7fcfa", resultRaised: "#e4f5ef", canvas: "#f1f6f4", topbar: "#fbfefd", data: "#ffffff" },
  alexandria: { nav: "#322319", navRaised: "#463126", selection: "#faf1ea", selectionStrong: "#efd9ca", result: "#fdf9f6", resultRaised: "#f5e7dc", canvas: "#f5f1ee", topbar: "#fffdfb", data: "#ffffff" },
  olympus: { nav: "#142f3d", navRaised: "#1d4254", selection: "#edf6f9", selectionStrong: "#d7eaf1", result: "#f7fbfc", resultRaised: "#e3f1f5", canvas: "#f0f5f7", topbar: "#fbfdfe", data: "#ffffff" },
  argus: { nav: "#252d38", navRaised: "#333e4c", selection: "#f0f2f5", selectionStrong: "#dfe4e9", result: "#f8f9fb", resultRaised: "#e9edf1", canvas: "#f2f4f6", topbar: "#fcfcfd", data: "#ffffff" },
  hermes: { nav: "#382216", navRaised: "#4c2e1c", selection: "#fff4ec", selectionStrong: "#f9dfcc", result: "#fffaf6", resultRaised: "#fbe9dc", canvas: "#f7f2ee", topbar: "#fffdfb", data: "#ffffff" },
  athena: { nav: "#28203b", navRaised: "#392c54", selection: "#f5f1fb", selectionStrong: "#e5dcf4", result: "#fbf9fd", resultRaised: "#eee7f8", canvas: "#f4f2f7", topbar: "#fdfcff", data: "#ffffff" },
  gaia: { nav: "#21301b", navRaised: "#304526", selection: "#f0f7ec", selectionStrong: "#deecd7", result: "#f9fcf7", resultRaised: "#e8f3e2", canvas: "#f2f6ef", topbar: "#fcfefb", data: "#ffffff" },
  pegasus: { nav: "#3b202b", navRaised: "#502c3b", selection: "#fcf0f4", selectionStrong: "#f3dbe4", result: "#fef9fb", resultRaised: "#f8e7ed", canvas: "#f7f1f3", topbar: "#fffdfd", data: "#ffffff" },
  titans: { nav: "#352918", navRaised: "#493923", selection: "#fbf5ea", selectionStrong: "#efe2ca", result: "#fdfbf7", resultRaised: "#f6ead8", canvas: "#f5f2ed", topbar: "#fffefc", data: "#ffffff" },
};''')

          replace_exact(shared,
          '''  const map: Record<string, IconName> = { atlas: "car", artemis: "kitchen", ares: "document", poseidon: "spark", pandora: "message", hercules: "check", zeus: "car" };''',
          '''  const map: Record<string, IconName> = { atlas: "car", artemis: "kitchen", ares: "document", poseidon: "spark", pandora: "message", hercules: "check", zeus: "car", alexandria: "document", olympus: "home", argus: "tag", hermes: "calendar", athena: "clipboard", gaia: "activity", pegasus: "user", titans: "table" };''')

          replace_exact(shared,
          '''        <div className={styles.localNotice}>Protótipo funcional · dados salvos somente neste navegador</div>''',
          '''        <div className={styles.localNotice}>Salvamento automático local · nenhum dado é enviado para servidores</div>''')

          app = "components/workspaces/phase-four/VerticalBusinessApp.tsx"

          replace_exact(app,
          '''  const completed = records.filter((record) => [config.statuses.at(-1), "Concluído", "Encerrado", "Entregue"].includes(record.status)).length;''',
          '''  const completed = records.filter((record) => !record.archived && [config.statuses.at(-1), "Concluído", "Encerrado", "Entregue"].includes(record.status)).length;''')

          replace_exact(app,
          '''  function advanceStatus() {
    if (!selected) return;
    const index = config.statuses.indexOf(selected.status);
    const next = config.statuses[Math.min(index + 1, config.statuses.length - 1)];
    updateSelected({ status: next }, `Situação alterada para ${next}`);
    setToast(`Registro avançou para ${next}`);
  }''',
          '''  function advanceStatus() {
    if (!selected) return;
    if (selected.archived) {
      setToast("Restaure o registro antes de alterar sua etapa");
      return;
    }
    const index = config.statuses.indexOf(selected.status);
    if (index < 0 || index >= config.statuses.length - 1) {
      setToast("Este registro já está na etapa final");
      return;
    }
    const next = config.statuses[index + 1];
    updateSelected({ status: next }, `Situação alterada para ${next}`);
    setToast(`Registro avançou para ${next}`);
  }

  function duplicateSelected() {
    if (!selected) return;
    const copy: MainRecord = {
      ...selected,
      id: uid(config.slug.slice(0, 3).toUpperCase()),
      title: `Cópia de ${selected.title}`,
      status: config.statuses[0],
      updated: "agora",
      archived: false,
      attachments: [],
      history: [{ text: `Registro duplicado a partir de ${selected.id}`, date: todayLabel() }],
    };
    setRecords((current) => [copy, ...current]);
    setSelectedId(copy.id);
    setDetailTab("Resumo");
    setToast(`${config.entityLabel} duplicado sem copiar anexos`);
  }

  function changeOperationStatus(item: RelatedRecord, status: string) {
    setRelated((current) => current.map((entry) => entry.id === item.id ? { ...entry, status } : entry));
    updateSelected({}, `${config.operationLabel} “${item.title}” alterado para ${status}`);
    setToast(`${config.operationLabel} atualizado`);
  }

  function removeOperation(item: RelatedRecord) {
    if (!window.confirm(`Remover “${item.title}”?`)) return;
    setRelated((current) => current.filter((entry) => entry.id !== item.id));
    updateSelected({}, `${config.operationLabel} removido: ${item.title}`);
    setToast(`${config.operationLabel} removido`);
  }

  function changeResourceStatus(item: ResourceRecord, status: string) {
    setResources((current) => current.map((entry) => entry.id === item.id ? { ...entry, status } : entry));
    updateSelected({}, `${config.resourceLabel} “${item.title}” alterado para ${status}`);
    setToast(`${config.resourceLabel} atualizado`);
  }

  function removeResource(item: ResourceRecord) {
    if (!window.confirm(`Remover “${item.title}”?`)) return;
    setResources((current) => current.filter((entry) => entry.id !== item.id));
    updateSelected({}, `${config.resourceLabel} removido: ${item.title}`);
    setToast(`${config.resourceLabel} removido`);
  }''')

          replace_exact(app,
          '''  function exportRecords() {
    downloadCsv(`${config.slug}-registros.csv`, [["Código", config.entityLabel, "Descrição", "Situação", "Responsável"], ...records.map((record) => [record.id, record.title, record.subtitle, record.status, record.owner])]);
    setToast("Planilha CSV gerada no navegador");
  }''',
          '''  function exportRecords() {
    const customHeaders = config.fields.map((field) => field.label);
    downloadCsv(`${config.slug}-registros.csv`, [
      ["Código", config.entityLabel, "Descrição", "Situação", "Responsável", "Arquivado", ...customHeaders],
      ...records.map((record) => [record.id, record.title, record.subtitle, record.status, record.owner, record.archived ? "Sim" : "Não", ...config.fields.map((field) => record.data[field.key] ?? "")]),
    ]);
    setToast("Planilha completa gerada no navegador");
  }''')

          replace_exact(app,
          '''    await copyText(`${product.name}\n${selected.id} · ${selected.title}\nSituação: ${selected.status}\nResponsável: ${selected.owner}`);''',
          '''    await copyText(`${product.name}\n${selected.id} · ${selected.title}\nSituação: ${selected.status}\nResponsável: ${selected.owner}\n${config.operationPlural}: ${selectedOperations.length}\n${config.resourcePlural}: ${selectedResources.length}`);''')

          replace_exact(app,
          '''  const selectedOperations = selected ? related.filter((item) => item.parentId === selected.id) : [];
  const selectedResources = selected ? resources.filter((item) => item.parentId === selected.id) : [];

  return <AppShell''',
          '''  const selectedOperations = selected ? related.filter((item) => item.parentId === selected.id) : [];
  const selectedResources = selected ? resources.filter((item) => item.parentId === selected.id) : [];
  const finalStatus = config.statuses.at(-1) ?? "";
  const isFinalStatus = selected?.status === finalStatus;
  const attentionResources = selectedResources.filter((item) => ["Pendente", "Vencendo", "Vencido", "Aguardando", "Aberto"].some((term) => item.status.includes(term))).length;
  const nextStatus = selected && !isFinalStatus ? config.statuses[Math.max(0, config.statuses.indexOf(selected.status) + 1)] : finalStatus;

  return <AppShell''')

          replace_exact(app,
          '''<div className={styles.headerButtons}><button className={styles.secondaryButton} onClick={shareSelected}><Icon name="message" /> Compartilhar</button><button className={styles.secondaryButton} onClick={() => window.print()}><Icon name="print" /> Imprimir</button><button className={styles.primaryButton} onClick={advanceStatus}>Avançar etapa</button></div>''',
          '''<div className={styles.headerButtons}><button className={styles.secondaryButton} onClick={shareSelected}><Icon name="message" /> Compartilhar</button><button className={styles.secondaryButton} onClick={() => window.print()}><Icon name="print" /> Imprimir</button><button className={styles.primaryButton} disabled={selected.archived || isFinalStatus} onClick={advanceStatus}>{selected.archived ? "Arquivado" : isFinalStatus ? "Etapa final" : "Avançar etapa"}</button></div>''')

          replace_exact(app,
          '''        <div className={styles.detailTabs}>{["Resumo", config.operationPlural, config.resourcePlural, "Histórico"].map((tab) => <button key={tab} className={detailTab === tab ? styles.tabActive : ""} onClick={() => setDetailTab(tab)}>{tab}</button>)}</div>''',
          '''        <div className={styles.detailTabs}>{[
          { label: "Resumo", count: 0 },
          { label: config.operationPlural, count: selectedOperations.length },
          { label: config.resourcePlural, count: selectedResources.length + selected.attachments.length },
          { label: "Histórico", count: selected.history.length },
        ].map((tab) => <button key={tab.label} className={detailTab === tab.label ? styles.tabActive : ""} onClick={() => setDetailTab(tab.label)}>{tab.label}{tab.count ? <span className={vertical.tabCount}>{tab.count}</span> : null}</button>)}</div>''')

          replace_exact(app,
          '''            {selected.archived ? <div className={vertical.archiveNotice}>Este registro está arquivado e foi preservado no histórico.</div> : null}
            <section className={vertical.dataCard}><div className={styles.sectionHeading}><div><h3>Dados principais</h3><p>Informações específicas deste {config.entityLabel.toLowerCase()}.</p></div></div><div className={vertical.editGrid}>''',
          '''            {selected.archived ? <div className={vertical.archiveNotice}>Este registro está arquivado. Restaure para voltar a editar ou avançar etapas.</div> : null}
            <section className={`${vertical.dataCard} ${vertical.focusCard}`}><div className={vertical.focusHeader}><div><span>Registro em foco</span><strong>{selected.status}</strong></div><StatusPill status={selected.status} /></div><div className={vertical.focusGrid}><div><span>Próxima etapa</span><strong>{selected.archived ? "Restaurar registro" : isFinalStatus ? "Fluxo concluído" : nextStatus}</strong></div><div><span>{config.operationPlural}</span><strong>{selectedOperations.length}</strong></div><div><span>{config.resourcePlural}</span><strong>{selectedResources.length}</strong></div><div><span>Atenções</span><strong>{attentionResources}</strong></div></div></section>
            <section className={vertical.dataCard}><div className={styles.sectionHeading}><div><h3>Dados principais</h3><p>Informações específicas deste {config.entityLabel.toLowerCase()} com salvamento automático.</p></div></div><fieldset className={vertical.editFieldset} disabled={selected.archived}>''')

          replace_exact(app,
          '''              {config.fields.map((field) => <label key={field.key} className={field.wide ? vertical.fullField : ""}>{field.label}{renderField(field, selected.data[field.key] ?? "", (value) => updateSelected({ data: { ...selected.data, [field.key]: value } }))}</label>)}
            </div></section>''',
          '''              {config.fields.map((field) => <label key={field.key} className={field.wide ? vertical.fullField : ""}>{field.label}{renderField(field, selected.data[field.key] ?? "", (value) => updateSelected({ data: { ...selected.data, [field.key]: value } }))}</label>)}
            </fieldset></section>''')

          replace_exact(app,
          '''<div className={vertical.inlineActions}><button className={styles.secondaryButton} onClick={exportRecords}><Icon name="download" /> Exportar lista</button><button className={selected.archived ? styles.primaryButton : styles.dangerButton} onClick={() => updateSelected({ archived: !selected.archived }, selected.archived ? "Registro restaurado" : "Registro arquivado")}>{selected.archived ? "Restaurar registro" : "Arquivar registro"}</button></div>''',
          '''<div className={vertical.inlineActions}><button className={styles.secondaryButton} onClick={duplicateSelected}><Icon name="plus" /> Duplicar</button><button className={styles.secondaryButton} onClick={exportRecords}><Icon name="download" /> Exportar lista completa</button><button className={selected.archived ? styles.primaryButton : styles.dangerButton} onClick={() => updateSelected({ archived: !selected.archived }, selected.archived ? "Registro restaurado" : "Registro arquivado")}>{selected.archived ? "Restaurar registro" : "Arquivar registro"}</button></div>''')

          replace_exact(app,
          '''<select value={item.status} onChange={(event) => setRelated((current) => current.map((entry) => entry.id === item.id ? { ...entry, status: event.target.value } : entry))}>{config.operationStatuses.map((status) => <option key={status}>{status}</option>)}</select><button className={styles.iconButton} onClick={() => setRelated((current) => current.filter((entry) => entry.id !== item.id))}><Icon name="trash" /></button>''',
          '''<select value={item.status} onChange={(event) => changeOperationStatus(item, event.target.value)}>{config.operationStatuses.map((status) => <option key={status}>{status}</option>)}</select><button className={styles.iconButton} aria-label={`Remover ${item.title}`} onClick={() => removeOperation(item)}><Icon name="trash" /></button>''')

          replace_exact(app,
          '''<div className={vertical.operationActions}><StatusPill status={item.status} /><button className={styles.iconButton} onClick={() => setResources((current) => current.filter((entry) => entry.id !== item.id))}><Icon name="trash" /></button></div>''',
          '''<div className={vertical.operationActions}><select value={item.status} onChange={(event) => changeResourceStatus(item, event.target.value)}>{config.resourceStatuses.map((status) => <option key={status}>{status}</option>)}</select><button className={styles.iconButton} aria-label={`Remover ${item.title}`} onClick={() => removeResource(item)}><Icon name="trash" /></button></div>''')

          replace_exact(app,
          '''{selected.attachments.map((file) => <div className={vertical.resourceRow} key={file.id}><div><strong>{file.name}</strong><p>Arquivo salvo somente neste navegador</p></div><button className={styles.iconButton} onClick={() => updateSelected({ attachments: selected.attachments.filter((item) => item.id !== file.id) })}><Icon name="trash" /></button></div>)}''',
          '''{selected.attachments.map((file) => <div className={vertical.resourceRow} key={file.id}><div><strong>{file.name}</strong><p>Arquivo salvo somente neste navegador</p></div><div className={vertical.operationActions}><a className={vertical.fileAction} href={file.data} download={file.name}><Icon name="download" /> Baixar</a><button className={styles.iconButton} aria-label={`Remover ${file.name}`} onClick={() => { if (window.confirm(`Remover “${file.name}”?`)) updateSelected({ attachments: selected.attachments.filter((item) => item.id !== file.id) }, `Arquivo removido: ${file.name}`); }}><Icon name="trash" /></button></div></div>)}''')

          replace_exact(app,
          '''onClick={() => { setSelectedId(record.id); setActive(config.entityPlural); }}''',
          '''onClick={() => { setSelectedId(record.id); setActive(config.entityPlural); setDetailTab("Resumo"); }}''')

          css = Path("components/workspaces/phase-four/VerticalBusinessApp.module.css")
          css.write_text(css.read_text() + '''

/* Polimento funcional compartilhado */
.editFieldset {
  min-width: 0;
  margin: 0;
  padding: 0;
  border: 0;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}
.editFieldset label { display: grid; gap: 6px; color: #475467; font-size: 9px; font-weight: 800; }
.editFieldset input, .editFieldset select, .editFieldset textarea {
  width: 100%; min-height: 40px; border: 1px solid var(--line); border-radius: 9px;
  padding: 8px 10px; outline: 0; background: #fff; color: #152033;
}
.editFieldset textarea { min-height: 88px; resize: vertical; }
.editFieldset:disabled { opacity: .72; }
.editFieldset:disabled input, .editFieldset:disabled select, .editFieldset:disabled textarea { cursor: not-allowed; background: #f7f8fa; }
.focusCard { border-color: color-mix(in srgb, var(--accent) 18%, var(--line)); background: color-mix(in srgb, var(--result-raised) 52%, #fff); }
.focusHeader { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 13px; }
.focusHeader > div { display: grid; gap: 4px; }
.focusHeader span, .focusGrid span { color: #667085; font-size: 8px; font-weight: 850; letter-spacing: .06em; text-transform: uppercase; }
.focusHeader strong { font-size: 14px; }
.focusGrid { display: grid; grid-template-columns: 1.4fr repeat(3, minmax(80px, .7fr)); border: 1px solid color-mix(in srgb, var(--accent) 12%, var(--line)); border-radius: 10px; overflow: hidden; background: #fff; }
.focusGrid > div { min-height: 61px; display: grid; gap: 6px; align-content: center; padding: 10px 12px; border-right: 1px solid var(--line); }
.focusGrid > div:last-child { border-right: 0; }
.focusGrid strong { font-size: 11px; line-height: 1.35; }
.tabCount { min-width: 19px; height: 19px; margin-left: 7px; padding: 0 5px; display: inline-grid; place-items: center; border-radius: 999px; background: color-mix(in srgb, currentColor 10%, transparent); font-size: 8px; }
.fileAction { min-height: 34px; display: inline-flex; align-items: center; gap: 6px; padding: 0 9px; border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--accent); font-size: 9px; font-weight: 800; }
.fileAction svg { width: 14px; height: 14px; }
:global(button:disabled) { cursor: not-allowed; opacity: .58; transform: none !important; }

@media (max-width: 760px) {
  .editFieldset { grid-template-columns: 1fr; }
  .focusGrid { grid-template-columns: 1fr 1fr; }
  .focusGrid > div:nth-child(2) { border-right: 0; }
  .focusGrid > div:nth-child(-n+2) { border-bottom: 1px solid var(--line); }
}

@media (max-width: 460px) {
  .focusGrid { grid-template-columns: 1fr; }
  .focusGrid > div { border-right: 0; border-bottom: 1px solid var(--line); }
  .focusGrid > div:last-child { border-bottom: 0; }
}
''')
          PY

      - name: Instalar dependências
        run: npm ci

      - name: Verificar TypeScript
        run: npm run lint

      - name: Gerar build
        run: npm run build

      - name: Auditar pendências estáticas
        shell: bash
        run: |
          INERT=$(rg -n 'onClick=\{\(\) => \{\s*\}\}|href="#"|TODO|FIXME' components/workspaces/phase-four app lib || true)
          COUNT=$(printf "%s" "$INERT" | sed '/^$/d' | wc -l)
          THEMES=$(python - <<'PY'
          from pathlib import Path
          slugs = ["atlas","artemis","ares","poseidon","pandora","hercules","zeus","alexandria","olympus","argus","hermes","athena","gaia","pegasus","titans"]
          text = Path("components/workspaces/phase-four/shared.tsx").read_text()
          print(sum(1 for slug in slugs if f"  {slug}: {{ nav:" in text))
          PY
          )
          {
            echo "APP_POLISH_VALIDATION=success"
            echo "NPM_CI_EXIT=0"
            echo "LINT_EXIT=0"
            echo "BUILD_EXIT=0"
            echo "THEMES_FOUND=$THEMES"
            echo "INERT_OR_TODO_PATTERNS=$COUNT"
            echo "VALIDATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "$INERT"
          } > .github/app-polish-validation.txt

      - name: Publicar melhorias no main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/workspaces/phase-four/shared.tsx components/workspaces/phase-four/VerticalBusinessApp.tsx components/workspaces/phase-four/VerticalBusinessApp.module.css .github/app-polish-validation.txt
          git commit -m "feat: close shared app gaps and polish local workflows [skip ci]"
          git push
