name: Finalizar interface SaaS

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/phase-three-hotfix.yml

permissions:
  contents: write

jobs:
  validate-and-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Corrigir ícone da distribuição
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('components/workspaces/phase-three/PhaseThreeWorkspace.tsx')
          content = path.read_text(encoding='utf-8')
          content = content.replace('<Icon name="mail" />', '<Icon name="message" />')
          path.write_text(content, encoding='utf-8')
          PY

      - name: Instalar dependências
        run: npm ci

      - name: Validar TypeScript
        run: npm run lint

      - name: Gerar build
        run: npm run build

      - name: Publicar correção no main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/workspaces/phase-three/PhaseThreeWorkspace.tsx
          git diff --cached --quiet && exit 0
          git commit -m "fix: validate phase three SaaS workspace"
          git push origin main
