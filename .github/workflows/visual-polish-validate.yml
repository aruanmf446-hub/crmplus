name: Validar reparo visual

on:
  push:
    branches: [main]
    paths:
      - components/workspaces/phase-four/SemanticHierarchy.module.css
      - app/workspace-ux-audit.css
      - .github/workflows/visual-polish-validate.yml

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Validar e registrar
        shell: bash
        run: |
          set +e
          npm ci > /tmp/npm.log 2>&1
          NPM_EXIT=$?
          npm run lint > /tmp/lint.log 2>&1
          LINT_EXIT=$?
          npm run build > /tmp/build.log 2>&1
          BUILD_EXIT=$?
          set -e

          if [ "$NPM_EXIT" -eq 0 ] && [ "$LINT_EXIT" -eq 0 ] && [ "$BUILD_EXIT" -eq 0 ]; then RESULT=success; else RESULT=failure; fi

          mkdir -p .qa
          {
            echo "RESULT=$RESULT"
            echo "NPM_EXIT=$NPM_EXIT"
            echo "LINT_EXIT=$LINT_EXIT"
            echo "BUILD_EXIT=$BUILD_EXIT"
            echo "COMMIT=$(git rev-parse HEAD)"
            echo
            cat /tmp/lint.log
            echo
            cat /tmp/build.log
          } > .qa/visual-polish-validation.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .qa/visual-polish-validation.txt
          git commit -m "chore: record visual repair validation [skip ci]" || true
          git push

          test "$RESULT" = success
