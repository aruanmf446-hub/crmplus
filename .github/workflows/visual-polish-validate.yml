name: Validar reparo visual

on:
  push:
    branches: [main]
    paths:
      - components/workspaces/phase-four/SemanticHierarchy.module.css
      - app/workspace-ux-audit.css
      - .github/workflows/visual-polish-validate.yml

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
