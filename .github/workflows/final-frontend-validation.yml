name: Validação final do front-end

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/final-frontend-validation.yml

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar, validar e compilar
        id: validate
        shell: bash
        run: |
          set +e
          LOG=.github/final-frontend-validation.log
          : > "$LOG"
          npm ci >> "$LOG" 2>&1
          INSTALL=$?
          if [ "$INSTALL" -eq 0 ]; then npm run lint >> "$LOG" 2>&1; LINT=$?; else LINT=99; fi
          if [ "$INSTALL" -eq 0 ] && [ "$LINT" -eq 0 ]; then npm run build >> "$LOG" 2>&1; BUILD=$?; else BUILD=99; fi
          if [ "$INSTALL" -eq 0 ] && [ "$LINT" -eq 0 ] && [ "$BUILD" -eq 0 ]; then RESULT=success; else RESULT=failure; fi
          {
            echo "RESULT=$RESULT"
            echo "NPM_CI_EXIT=$INSTALL"
            echo "LINT_EXIT=$LINT"
            echo "BUILD_EXIT=$BUILD"
            echo "COMMIT=$(git rev-parse HEAD)"
            echo ""
            tail -n 160 "$LOG"
          } > .github/final-frontend-validation.txt
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
      - name: Registrar resultado
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/final-frontend-validation.txt
          git commit -m "chore: record final frontend validation [skip ci]" || true
          git push
      - name: Falhar se necessário
        if: steps.validate.outputs.result != 'success'
        run: exit 1
