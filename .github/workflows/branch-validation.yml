name: Validar pacote estrutural

on:
  push:
    branches:
      - fix/arquitetura-ux-integridade
    paths-ignore:
      - audits/branch-validation.txt
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crmplus-branch-validation
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/arquitetura-ux-integridade
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        id: install
        continue-on-error: true
        run: npm ci > /tmp/install.log 2>&1

      - name: Auditar dependências de produção
        id: production_audit
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm audit --omit=dev --json > /tmp/audit-production.json 2>&1

      - name: Auditar todas as dependências
        id: full_audit
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm audit --json > /tmp/audit-full.json 2>&1

      - name: Validar TypeScript
        id: typescript
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run lint > /tmp/typescript.log 2>&1

      - name: Gerar build estático
        id: build
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run build > /tmp/build.log 2>&1
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_BUILD_SHA: branch-validation

      - name: Gerar relatório rastreável
        if: always()
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          PRODUCTION_AUDIT_OUTCOME: ${{ steps.production_audit.outcome }}
          FULL_AUDIT_OUTCOME: ${{ steps.full_audit.outcome }}
          TYPESCRIPT_OUTCOME: ${{ steps.typescript.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          VALIDATED_SHA: ${{ github.sha }}
        run: |
          mkdir -p audits
          {
            echo "COMMIT VALIDADO: ${VALIDATED_SHA}"
            echo "DEPENDÊNCIAS: ${INSTALL_OUTCOME}"
            echo "AUDITORIA PRODUÇÃO: ${PRODUCTION_AUDIT_OUTCOME}"
            echo "AUDITORIA COMPLETA: ${FULL_AUDIT_OUTCOME}"
            echo "TYPESCRIPT: ${TYPESCRIPT_OUTCOME}"
            echo "BUILD: ${BUILD_OUTCOME}"
            echo
            echo "=== INSTALAÇÃO ==="
            cat /tmp/install.log 2>/dev/null || true
            echo
            echo "=== AUDITORIA DE PRODUÇÃO ==="
            cat /tmp/audit-production.json 2>/dev/null || true
            echo
            echo "=== AUDITORIA COMPLETA ==="
            cat /tmp/audit-full.json 2>/dev/null || true
            echo
            echo "=== TYPESCRIPT ==="
            cat /tmp/typescript.log 2>/dev/null || true
            echo
            echo "=== BUILD ==="
            cat /tmp/build.log 2>/dev/null || true
          } > audits/branch-validation.txt

      - name: Salvar relatório somente na branch técnica
        if: always()
        run: |
          git config user.name "crmplus-quality-bot"
          git config user.email "actions@users.noreply.github.com"
          git add audits/branch-validation.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Registrar validação da branch técnica"
          git push origin HEAD:fix/arquitetura-ux-integridade

      - name: Bloquear pacote inválido
        if: always()
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          PRODUCTION_AUDIT_OUTCOME: ${{ steps.production_audit.outcome }}
          TYPESCRIPT_OUTCOME: ${{ steps.typescript.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        run: |
          test "${INSTALL_OUTCOME}" = "success"
          test "${PRODUCTION_AUDIT_OUTCOME}" = "success"
          test "${TYPESCRIPT_OUTCOME}" = "success"
          test "${BUILD_OUTCOME}" = "success"
