name: Validar pacote estrutural

on:
  push:
    branches:
      - fix/arquitetura-ux-integridade
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crmplus-branch-validation
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: TypeScript
        run: npm run lint
      - name: Build estático
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_BUILD_SHA: branch-validation
