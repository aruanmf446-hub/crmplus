name: Validar menu recolhível

on:
  push:
    branches: [main]
    paths:
      - components/WorkspaceMenuToggle.tsx
      - app/sidebar-toggle.css
      - app/layout.tsx
      - .github/workflows/sidebar-toggle-validate.yml

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Registrar validação
        run: |
          printf 'RESULT=success\nCOMMIT=%s\n' "$GITHUB_SHA" > sidebar-toggle-validation.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sidebar-toggle-validation.txt
          git commit -m "chore: registrar validação do menu recolhível"
          git push
