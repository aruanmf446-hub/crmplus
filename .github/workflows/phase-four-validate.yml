name: Validar aplicativos locais

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/phase-four-validate.yml

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Validar projeto
        id: validate
        shell: bash
        run: |
          set +e
          LOG_FILE="phase-four-validation.log"
          : > "$LOG_FILE"

          npm ci >> "$LOG_FILE" 2>&1
          INSTALL_CODE=$?

          if [ "$INSTALL_CODE" -eq 0 ]; then
            npm run lint >> "$LOG_FILE" 2>&1
            LINT_CODE=$?
          else
            LINT_CODE=99
          fi

          if [ "$INSTALL_CODE" -eq 0 ] && [ "$LINT_CODE" -eq 0 ]; then
            npm run build >> "$LOG_FILE" 2>&1
            BUILD_CODE=$?
          else
            BUILD_CODE=99
          fi

          if [ "$INSTALL_CODE" -eq 0 ] && [ "$LINT_CODE" -eq 0 ] && [ "$BUILD_CODE" -eq 0 ]; then
            RESULT="success"
          else
            RESULT="failure"
          fi

          {
            echo "PHASE_FOUR_VALIDATION=$RESULT"
            echo "SOURCE_COMMIT=$GITHUB_SHA"
            echo "NPM_CI_EXIT=$INSTALL_CODE"
            echo "LINT_EXIT=$LINT_CODE"
            echo "BUILD_EXIT=$BUILD_CODE"
            echo "VALIDATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            echo "LAST_LOG_LINES"
            tail -n 80 "$LOG_FILE"
          } > .github/phase-four-validation.txt

          cat .github/phase-four-validation.txt
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
      - name: Registrar resultado no repositório
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/phase-four-validation.txt
          git commit -m "chore: record phase four validation [skip ci]" || true
          git push
      - name: Falhar quando a validação reprovar
        if: steps.validate.outputs.result != 'success'
        run: exit 1
