name: Aplicar seleção inicial orientada à experiência

on:
  push:
    paths:
      - ".github/workflows/apply-default-selections.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Selecionar o primeiro contexto útil
        run: |
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              "components/workspaces/phase-four/AtlasApp.tsx": (
                  'const [selectedId, setSelectedId] = useState("");',
                  'const [selectedId, setSelectedId] = useState(initialOrders[0]?.id ?? "");',
              ),
              "components/workspaces/phase-four/AresApp.tsx": (
                  'const [selectedId, setSelectedId] = useState("");',
                  'const [selectedId, setSelectedId] = useState(initialQuotes[0]?.id ?? "");',
              ),
              "components/workspaces/phase-four/PandoraApp.tsx": (
                  'const [selectedId, setSelectedId] = useState("");',
                  'const [selectedId, setSelectedId] = useState(initialFeedbacks[0]?.id ?? "");',
              ),
              "components/workspaces/phase-four/PoseidonApp.tsx": (
                  'const [selectedId, setSelectedId] = useState("");',
                  'const [selectedId, setSelectedId] = useState(initialOpportunities[0]?.id ?? "");',
              ),
              "components/workspaces/phase-four/ArtemisApp.tsx": (
                  'const [selectedId, setSelectedId] = useState<number | null>(null);',
                  'const [selectedId, setSelectedId] = useState<number | null>(initialTables.find((table) => table.status !== "Livre")?.id ?? initialTables[0]?.id ?? null);',
              ),
          }

          for filename, (old, new) in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Trecho esperado não encontrado em {filename}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Remover automação temporária
        run: rm .github/workflows/apply-default-selections.yml

      - name: Publicar alteração no main
        run: |
          git config user.name "CRM Plus UX"
          git config user.email "actions@users.noreply.github.com"
          git add components/workspaces/phase-four .github/workflows/apply-default-selections.yml
          git commit -m "Mostrar contexto útil ao abrir os aplicativos"
          git push origin main
