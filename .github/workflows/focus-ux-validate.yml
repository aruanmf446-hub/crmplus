name: Validar redesign focado

on:
  push:
    branches: [main]
    paths:
      - app/workspace-focus.css
      - app/layout.tsx
      - .github/workflows/focus-ux-validate.yml

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
