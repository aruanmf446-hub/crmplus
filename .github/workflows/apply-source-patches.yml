name: Aplicar melhorias estruturais

on:
  push:
    branches: [main]
    paths:
      - 'scripts/patch-*.py'
      - '.github/workflows/apply-source-patches.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crmplus-source-patches
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Aplicar patches
        run: |
          failed=0
          for script in scripts/patch-*.py; do
            echo "::group::Aplicando $script"
            if python "$script"; then
              echo "Aplicado: $script"
            else
              echo "::warning file=$script::Este grupo não correspondeu integralmente ao código atual. Os outros grupos continuarão."
              failed=$((failed + 1))
            fi
            echo "::endgroup::"
          done
          echo "Grupos com correspondência pendente: $failed"

      - name: Instalar dependências
        run: npm ci

      - name: Validar TypeScript
        run: |
          set +e
          npm run lint > /tmp/lint-report.txt 2>&1
          status=$?
          cat /tmp/lint-report.txt
          if [ "$status" -ne 0 ]; then
            {
              echo "## Erros encontrados no TypeScript"
              echo '```text'
              tail -n 120 /tmp/lint-report.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit "$status"
          fi

      - name: Gerar site estático
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Publicar alterações no main
        run: |
          if git diff --quiet; then
            echo "Nenhuma alteração pendente."
            exit 0
          fi
          git config user.name "crmplus-automation"
          git config user.email "actions@users.noreply.github.com"
          git add components app
          git commit -m "Padronizar listas, filtros e históricos dos aplicativos"
          git push origin main
