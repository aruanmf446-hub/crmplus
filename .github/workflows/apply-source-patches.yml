name: Aplicar ajuste final do Ares

on:
  push:
    branches: [main]
    paths:
      - 'scripts/patch-ares-final-status.py'
      - '.github/workflows/apply-source-patches.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: python scripts/patch-ares-final-status.py
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
      - run: |
          git config user.name "crmplus-automation"
          git config user.email "actions@users.noreply.github.com"
          git add components/workspaces/phase-four/AresApp.tsx
          git commit -m "Manter alteração solicitada nas propostas em andamento"
          git push origin main
