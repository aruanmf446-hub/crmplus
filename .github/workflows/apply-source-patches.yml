name: Aplicar correção vertical final

on:
  push:
    branches: [main]
    paths:
      - 'scripts/patch-*.py'
      - '.github/workflows/apply-source-patches.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Aplicar patch
        run: python scripts/patch-vertical-controls.py

      - name: Instalar dependências
        run: npm ci

      - name: Validar TypeScript
        run: npm run lint

      - name: Gerar site estático
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Publicar no main
        run: |
          git config user.name "crmplus-automation"
          git config user.email "actions@users.noreply.github.com"
          git add components/workspaces/phase-four/VerticalBusinessApp.tsx
          git commit -m "Exibir andamento, finalizados e classificação nos verticais"
          git push origin main
