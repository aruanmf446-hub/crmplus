name: Validar auditoria do front-end

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/frontend-audit-validate.yml

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validar front-end
        id: validate
        shell: bash
        run: |
          set +e
          LOG=.github/frontend-audit-build.log
          : > "$LOG"

          npm ci >> "$LOG" 2>&1
          INSTALL=$?

          if [ "$INSTALL" -eq 0 ]; then
            npm run lint >> "$LOG" 2>&1
            LINT=$?
          else
            LINT=99
          fi

          if [ "$INSTALL" -eq 0 ] && [ "$LINT" -eq 0 ]; then
            npm run build >> "$LOG" 2>&1
            BUILD=$?
          else
            BUILD=99
          fi

          if [ "$INSTALL" -eq 0 ] && [ "$LINT" -eq 0 ] && [ "$BUILD" -eq 0 ]; then
            RESULT=success
          else
            RESULT=failure
          fi

          {
            echo "FRONTEND_AUDIT_VALIDATION=$RESULT"
            echo "NPM_CI_EXIT=$INSTALL"
            echo "LINT_EXIT=$LINT"
            echo "BUILD_EXIT=$BUILD"
            echo "VALIDATED_COMMIT=$(git rev-parse HEAD)"
            echo "VALIDATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            tail -n 140 "$LOG"
          } > .github/frontend-audit-validation.txt

          echo "result=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Registrar resultado
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/frontend-audit-validation.txt
          git commit -m "chore: record frontend audit validation [skip ci]" || true
          git push

      - name: Falhar se necessário
        if: steps.validate.outputs.result != 'success'
        run: exit 1
