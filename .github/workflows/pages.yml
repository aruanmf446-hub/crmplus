name: Publicar CRMPlus no GitHub Pages
run-name: Publicar catálogo completo do CRMPlus

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Instalar dependências
        run: npm ci

      - name: Verificar TypeScript
        run: npm run lint

      - name: Gerar site estático
        run: npm run build
        env:
          NEXT_PUBLIC_BUILD_SHA: ${{ github.sha }}

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Confirmar commit publicado
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          for attempt in {1..30}; do
            html="$(curl --fail --silent --show-error --location "${PAGE_URL}?build=${EXPECTED_SHA}" || true)"
            if printf '%s' "$html" | grep --fixed-strings --quiet "data-build-sha=\"${EXPECTED_SHA}\""; then
              echo "Versão ${EXPECTED_SHA} confirmada em ${PAGE_URL}"
              exit 0
            fi
            echo "Tentativa ${attempt}/30: aguardando propagação da versão ${EXPECTED_SHA}"
            sleep 10
          done
          echo "A página pública não corresponde ao commit ${EXPECTED_SHA}."
          exit 1

      - name: Validar rotas essenciais
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          home="$(curl --fail --silent --show-error --location "${PAGE_URL}?qa=${EXPECTED_SHA}")"
          recovery="$(curl --fail --silent --show-error --location "${PAGE_URL}recuperar-senha/?qa=${EXPECTED_SHA}")"
          atlas="$(curl --fail --silent --show-error --location "${PAGE_URL}sistemas/atlas/?qa=${EXPECTED_SHA}")"
          printf '%s' "$home" | grep --fixed-strings --quiet "Sistemas simples para"
          printf '%s' "$recovery" | grep --fixed-strings --quiet "recuperar a senha"
          printf '%s' "$atlas" | grep --fixed-strings --quiet "Entrar no aplicativo"
          echo "Home, recuperação de senha e bloqueio de acesso validados na produção."
