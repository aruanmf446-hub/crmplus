name: Completar interações locais

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/phase-four-enhance.yml

permissions:
  contents: write

jobs:
  enhance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Completar interações
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f'target not found in {path}: {old[:100]}')
              p.write_text(text.replace(old, new))

          base = 'components/workspaces/phase-four'

          replace(f'{base}/AtlasApp.tsx',
          '''<section className={styles.infoSection}><div className={styles.sectionHeading}><div><h3>Orçamento descritivo</h3><p>Peças são apenas descrições; não existe controle de estoque.</p></div><button onClick={() => setModal("service")}><Icon name="plus" /> Adicionar item</button></div>''',
          '''<section className={styles.infoSection}><div className={styles.sectionHeading}><div><h3>Orçamento descritivo</h3><p>Peças são apenas descrições; não existe controle de estoque.</p></div><div className={styles.headerButtons}><button className={styles.secondaryButton} onClick={() => window.print()}><Icon name="print" /> Imprimir orçamento</button><button className={styles.primaryButton} onClick={() => setModal("service")}><Icon name="plus" /> Adicionar item</button></div></div>''')
          replace(f'{base}/AtlasApp.tsx',
          '''{active === "Clientes" ? <DirectoryView title="Clientes da oficina" rows={Array.from(new Set(orders.map((order) => order.client)))} /> : null}
              {active === "Veículos" ? <DirectoryView title="Veículos cadastrados" rows={orders.map((order) => `${order.vehicle} · ${order.plate}`)} /> : null}''',
          '''{active === "Clientes" ? <DirectoryView title="Clientes da oficina" rows={Array.from(new Set(orders.map((order) => order.client)))} onSelect={(row) => { const order = orders.find((item) => item.client === row); if (order) { setSelectedId(order.id); setActive("Ordens de serviço"); } }} /> : null}
              {active === "Veículos" ? <DirectoryView title="Veículos cadastrados" rows={orders.map((order) => `${order.vehicle} · ${order.plate}`)} onSelect={(row) => { const order = orders.find((item) => row.includes(item.plate)); if (order) { setSelectedId(order.id); setActive("Ordens de serviço"); } }} /> : null}''')
          replace(f'{base}/AtlasApp.tsx',
          '''function DirectoryView({ title, rows }: { title: string; rows: string[] }) {''',
          '''function DirectoryView({ title, rows, onSelect }: { title: string; rows: string[]; onSelect: (row: string) => void }) {''')
          replace(f'{base}/AtlasApp.tsx',
          '''<div className={styles.directoryRows}>{filtered.map((row) => <button key={row}>''',
          '''<div className={styles.directoryRows}>{filtered.map((row) => <button key={row} onClick={() => onSelect(row)}>''')

          replace(f'{base}/ArtemisApp.tsx',
          '''  const [toast, setToast] = useState("");''',
          '''  const [toast, setToast] = useState("");
            const [historyPreview, setHistoryPreview] = useState<ClosedOrder | null>(null);''')
          replace(f'{base}/ArtemisApp.tsx',
          '''<div className={styles.directoryRows}>{history.map((item) => <button key={item.id}>''',
          '''<div className={styles.directoryRows}>{history.map((item) => <button key={item.id} onClick={() => setHistoryPreview(item)}>''')
          replace(f'{base}/ArtemisApp.tsx',
          '''    <Modal open={modal === "command"} title="Nova comanda"''',
          '''    <Modal open={Boolean(historyPreview)} title={historyPreview?.place ?? "Comanda"} description={historyPreview?.id} onClose={() => setHistoryPreview(null)}><div className={styles.historySummary}><div><span>Encerrada em</span><strong>{historyPreview?.closedAt}</strong></div><div><span>Quantidade de itens</span><strong>{historyPreview?.items}</strong></div><div><span>Total registrado</span><strong>{currency(historyPreview?.total ?? 0)}</strong></div></div></Modal>
              <Modal open={modal === "command"} title="Nova comanda"''')

          replace(f'{base}/AresApp.tsx',
          '''return <button key={client}>''',
          '''return <button key={client} onClick={() => { const quote = quotes.find((item) => item.client === client); if (quote) { setSelectedId(quote.id); setActive("Orçamentos"); } }}>''')

          replace(f'{base}/PoseidonApp.tsx',
          '''import { useMemo, useState } from "react";''',
          '''import { useMemo, useState, type ChangeEvent } from "react";''')
          replace(f'{base}/PoseidonApp.tsx',
          '''import { currency, todayLabel, uid, useLocalState } from "./localStore";''',
          '''import { currency, fileToDataUrl, todayLabel, uid, useLocalState } from "./localStore";''')
          replace(f'{base}/PoseidonApp.tsx',
          '''  function closeOpportunity(stage: "Ganha" | "Perdida") {
              updateSelected({ stage }, `Negociação encerrada como ${stage}`); setToast(`Oportunidade marcada como ${stage}`);
            }
          ''',
          '''  function closeOpportunity(stage: "Ganha" | "Perdida") {
              updateSelected({ stage }, `Negociação encerrada como ${stage}`); setToast(`Oportunidade marcada como ${stage}`);
            }

            async function addFiles(event: ChangeEvent<HTMLInputElement>) {
              if (!selected || !event.target.files?.length) return;
              const urls = await Promise.all(Array.from(event.target.files).slice(0, 3).map(fileToDataUrl));
              updateSelected({ files: [...selected.files, ...urls] }, `${urls.length} arquivo(s) anexado(s)`);
              setToast("Arquivos salvos neste navegador");
            }
          ''')
          replace(f'{base}/PoseidonApp.tsx',
          '''{detailTab === "Arquivos" ? <EmptyState icon="document" title="Sem arquivos anexados" description="Nesta fase, o protótipo mantém somente registros textuais locais." /> : null}''',
          '''{detailTab === "Arquivos" ? <section className={styles.infoSection}><div className={styles.sectionHeading}><div><h3>Arquivos da oportunidade</h3><p>Anexos mantidos somente neste navegador.</p></div><label className={styles.secondaryButton}><Icon name="plus" /> Anexar<input hidden type="file" multiple onChange={addFiles} /></label></div><div className={styles.fileRows}>{selected.files.map((file, index) => <div key={`${file.slice(0, 24)}-${index}`}><Icon name="document" /><div><strong>Arquivo {index + 1}</strong><small>Armazenado localmente</small></div><button className={styles.iconButton} onClick={() => updateSelected({ files: selected.files.filter((_, fileIndex) => fileIndex !== index) }, `Arquivo ${index + 1} removido`)}><Icon name="trash" /></button></div>)}</div>{!selected.files.length ? <EmptyState icon="document" title="Sem arquivos anexados" description="Adicione propostas, imagens ou documentos para validar o fluxo local." action={<label className={styles.primaryButton}>Selecionar arquivos<input hidden type="file" multiple onChange={addFiles} /></label>} /> : null}</section> : null}''')
          replace(f'{base}/PoseidonApp.tsx',
          '''{active === "Histórico" ? <section className={styles.pageSheet}><div className={styles.pageHeading}><div><span className={styles.eyebrow}>Negociações encerradas</span><h2>Ganhos e perdas</h2><p>Decisões registradas com histórico preservado.</p></div></div><div className={styles.directoryRows}>{opportunities.filter((item) => ["Ganha", "Perdida"].includes(item.stage)).map((item) => <button key={item.id}>''',
          '''{active === "Histórico" ? <section className={styles.pageSheet}><div className={styles.pageHeading}><div><span className={styles.eyebrow}>Negociações encerradas</span><h2>Ganhos e perdas</h2><p>Decisões registradas com histórico preservado.</p></div></div><div className={styles.directoryRows}>{opportunities.filter((item) => ["Ganha", "Perdida"].includes(item.stage)).map((item) => <button key={item.id} onClick={() => { setSelectedId(item.id); setActive("Oportunidades"); }}>''')

          replace(f'{base}/PandoraApp.tsx',
          '''  const [modal, setModal] = useState<"survey" | "theme" | "qr" | null>(null);''',
          '''  const [modal, setModal] = useState<"survey" | "theme" | "qr" | "response" | null>(null);''')
          replace(f'{base}/PandoraApp.tsx',
          '''  const [qrSurvey, setQrSurvey] = useState<Survey | null>(null);''',
          '''  const [qrSurvey, setQrSurvey] = useState<Survey | null>(null);
            const [responseSurvey, setResponseSurvey] = useState<Survey | null>(null);
            const [responseDraft, setResponseDraft] = useState({ customer: "Cliente teste", score: 8, comment: "", theme: "Atendimento" });''')
          replace(f'{base}/PandoraApp.tsx',
          '''  function exportResponses() {
              downloadCsv("respostas-pandora.csv", [["Código", "Cliente", "Nota", "Canal", "Tema", "Situação", "Comentário"], ...feedbacks.map((item) => [item.id, item.customer, item.score, item.channel, item.theme, item.status, item.comment])]);
              setToast("Arquivo CSV gerado no navegador");
            }
          ''',
          '''  function exportResponses() {
              downloadCsv("respostas-pandora.csv", [["Código", "Cliente", "Nota", "Canal", "Tema", "Situação", "Comentário"], ...feedbacks.map((item) => [item.id, item.customer, item.score, item.channel, item.theme, item.status, item.comment])]);
              setToast("Arquivo CSV gerado no navegador");
            }

            function simulateResponse() {
              if (!responseSurvey || !responseDraft.comment.trim()) return;
              const feedback: Feedback = { id: uid("R"), customer: responseDraft.customer.trim() || "Cliente teste", score: responseDraft.score, channel: responseSurvey.name, date: todayLabel(), comment: responseDraft.comment.trim(), theme: responseDraft.theme, status: "Novo", priority: responseDraft.score <= 6, treatment: "" };
              setFeedbacks((current) => [feedback, ...current]);
              setSurveys((current) => current.map((survey) => survey.id === responseSurvey.id ? { ...survey, responses: survey.responses + 1 } : survey));
              setSelectedId(feedback.id);
              setResponseDraft({ customer: "Cliente teste", score: 8, comment: "", theme: "Atendimento" });
              setResponseSurvey(null); setModal(null); setActive("Respostas"); setToast("Resposta simulada adicionada à caixa de entrada");
            }
          ''')
          replace(f'{base}/PandoraApp.tsx',
          '''<button className={styles.classificationActive}>{selected.theme}</button>''',
          '''<button className={styles.classificationActive} onClick={() => setModal("theme")}>{selected.theme}</button>''')
          replace(f'{base}/PandoraApp.tsx',
          '''<div><button className={styles.secondaryButton} onClick={() => copySurveyLink(survey)}>Copiar link</button>''',
          '''<div><button className={styles.primaryButton} onClick={() => { setResponseSurvey(survey); setModal("response"); }}>Simular resposta</button><button className={styles.secondaryButton} onClick={() => copySurveyLink(survey)}>Copiar link</button>''')
          replace(f'{base}/PandoraApp.tsx',
          '''    <Modal open={modal === "survey"} title="Nova pesquisa"''',
          '''    <Modal open={modal === "response"} title={`Responder · ${responseSurvey?.name ?? "Pesquisa"}`} description="Simulação local do formulário que o cliente receberá." onClose={() => { setModal(null); setResponseSurvey(null); }}><Form onSubmit={simulateResponse}><Field label="Cliente"><input value={responseDraft.customer} onChange={(event) => setResponseDraft((current) => ({ ...current, customer: event.target.value }))} /></Field><Field label="Nota de 0 a 10"><input type="number" min="0" max="10" value={responseDraft.score} onChange={(event) => setResponseDraft((current) => ({ ...current, score: Math.min(10, Math.max(0, Number(event.target.value) || 0)) }))} /></Field><Field label="Comentário"><textarea required value={responseDraft.comment} onChange={(event) => setResponseDraft((current) => ({ ...current, comment: event.target.value }))} /></Field><Field label="Tema"><select value={responseDraft.theme} onChange={(event) => setResponseDraft((current) => ({ ...current, theme: event.target.value }))}><option>Atendimento</option><option>Tempo de resposta</option><option>Comunicação</option><option>Agilidade</option><option>Qualidade</option></select></Field><div className={styles.modalActions}><button className={styles.primaryButton}>Enviar resposta simulada</button></div></Form></Modal>
              <Modal open={modal === "survey"} title="Nova pesquisa"''')

          replace(f'{base}/HerculesApp.tsx',
          '''  const nav: NavItem[] = [{ label: "Executar inspeção", icon: "check" }, { label: "Programadas", icon: "calendar" }, { label: "Desvios", icon: "warning" }, { label: "Modelos", icon: "clipboard" }];''',
          '''  const nav: NavItem[] = [{ label: "Executar inspeção", icon: "check" }, { label: "Programadas", icon: "calendar" }, { label: "Desvios", icon: "warning" }, { label: "Modelos", icon: "clipboard" }];
            const readOnly = inspection?.status === "Concluída";''')
          replace(f'{base}/HerculesApp.tsx',
          '''  function updateItem(patch: Partial<CheckItem>) {
              if (!currentItem) return;''',
          '''  function updateItem(patch: Partial<CheckItem>) {
              if (!currentItem || readOnly) return;''')
          replace(f'{base}/HerculesApp.tsx',
          '''  function answer(result: Result) {
              if (!currentItem) return;''',
          '''  function answer(result: Result) {
              if (!currentItem || readOnly) { setToast("Inspeções concluídas ficam disponíveis somente para consulta"); return; }''')
          replace(f'{base}/HerculesApp.tsx',
          '''  function startInspection(item: Inspection) {
              setInspections((current) => current.map((inspectionItem) => inspectionItem.id === item.id ? { ...inspectionItem, status: "Em execução" } : inspectionItem));
              setCurrentInspectionId(item.id); setCurrentItemId(item.items[0].id); setActive("Executar inspeção");
            }
          ''',
          '''  function startInspection(item: Inspection) {
              setInspections((current) => current.map((inspectionItem) => inspectionItem.id === item.id ? { ...inspectionItem, status: "Em execução" } : inspectionItem));
              setCurrentInspectionId(item.id); setCurrentItemId(item.items[0].id); setActive("Executar inspeção");
            }

            function reviewInspection(item: Inspection) {
              setCurrentInspectionId(item.id); setCurrentItemId(item.items[0].id); setActive("Executar inspeção");
            }
          ''')
          replace(f'{base}/HerculesApp.tsx',
          '''action={active === "Executar inspeção" ? <button className={styles.primaryButton} onClick={finishInspection}><Icon name="check" /> Concluir inspeção</button> :''',
          '''action={active === "Executar inspeção" ? <button className={styles.primaryButton} disabled={readOnly} onClick={finishInspection}><Icon name="check" /> {readOnly ? "Inspeção concluída" : "Concluir inspeção"}</button> :''')
          replace(f'{base}/HerculesApp.tsx',
          '''<Field label="Observação do item"><textarea value={currentItem.note} onChange={(event) => updateItem({ note: event.target.value })} placeholder="Descreva a condição encontrada" /></Field>''',
          '''<Field label="Observação do item"><textarea disabled={readOnly} value={currentItem.note} onChange={(event) => updateItem({ note: event.target.value })} placeholder="Descreva a condição encontrada" /></Field>''')
          replace(f'{base}/HerculesApp.tsx',
          '''<label className={styles.secondaryButton}>Selecionar foto<input hidden type="file" accept="image/*" multiple onChange={addEvidence} /></label>''',
          '''{!readOnly ? <label className={styles.secondaryButton}>Selecionar foto<input hidden type="file" accept="image/*" multiple onChange={addEvidence} /></label> : <StatusPill status="Somente leitura" />}''')
          replace(f'{base}/HerculesApp.tsx',
          '''map((item) => <button key={item.id}>''',
          '''map((item) => <button key={item.id} onClick={() => reviewInspection(item)}>''')

          css = Path(f'{base}/PhaseFourWorkspace.module.css')
          css_text = css.read_text()
          marker = '.fileRows, .historySummary'
          if marker not in css_text:
              css.write_text(css_text + '''

          .fileRows, .historySummary { display: grid; gap: 8px; }
          .fileRows > div { min-height: 54px; border: 1px solid var(--line); border-radius: 9px; padding: 9px 10px; display: grid; grid-template-columns: 28px minmax(0,1fr) 38px; gap: 9px; align-items: center; }
          .fileRows > div > svg { color: var(--accent); }
          .fileRows > div > div { display: grid; gap: 2px; }
          .fileRows strong { font-size: 10px; }
          .fileRows small { color: #98a2b3; font-size: 8px; }
          .historySummary { grid-template-columns: repeat(3, minmax(0,1fr)); }
          .historySummary > div { border: 1px solid var(--line); border-radius: 10px; padding: 13px; display: grid; gap: 5px; }
          .historySummary span { color: #7a8494; font-size: 8px; text-transform: uppercase; }
          .historySummary strong { font-size: 12px; }
          @media (max-width: 620px) { .historySummary { grid-template-columns: 1fr; } }
          ''')
          PY
      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar dependências
        run: npm ci
      - name: TypeScript
        run: npm run lint
      - name: Build estático
        run: npm run build
      - name: Registrar resultado
        shell: bash
        run: |
          printf 'PHASE_FOUR_ENHANCEMENT=success\nSOURCE_COMMIT=%s\nVALIDATED_AT=%s\n' "$GITHUB_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .github/phase-four-enhancement-validation.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/workspaces/phase-four .github/phase-four-enhancement-validation.txt
          git commit -m "feat: complete remaining local SaaS interactions [skip ci]"
          git push
