name: Aplicar correções da auditoria de processos

on:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-process-audit-fixes.py'
      - '.github/workflows/apply-process-audit-fixes.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crmplus-process-fixes
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Aplicar correções comprovadas
        run: python scripts/apply-process-audit-fixes.py

      - name: Instalar dependências
        run: npm ci

      - name: Validar TypeScript
        run: npm run lint

      - name: Gerar site estático
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Publicar código corrigido no main
        run: |
          if git diff --quiet; then
            echo 'Nenhuma alteração pendente.'
            exit 0
          fi
          git config user.name 'crmplus-process-agent'
          git config user.email 'actions@users.noreply.github.com'
          git add components/workspaces/phase-four
          git commit -m 'Corrigir bloqueios e histórico dos processos'
          git push origin main
