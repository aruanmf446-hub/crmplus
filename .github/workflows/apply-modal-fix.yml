name: Aplicar correção única dos modais

on:
  push:
    branches: ["main"]
    paths:
      - scripts/apply-modal-inert-fix.mjs
      - .github/workflows/apply-modal-fix.yml

permissions:
  contents: write

concurrency:
  group: crmplus-modal-maintenance
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Aplicar alteração validada
        run: node scripts/apply-modal-inert-fix.mjs
      - name: Validar TypeScript do arquivo alterado
        run: |
          npm ci
          npm run lint
          npm run typecheck
      - name: Remover auxiliares e publicar correção
        run: |
          rm scripts/apply-modal-inert-fix.mjs
          rm .github/workflows/apply-modal-fix.yml
          git config user.name "crmplus-maintenance"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Corrigir isolamento acessível dos modais"
          git push origin HEAD:main
