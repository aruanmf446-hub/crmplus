name: Auditar processos e interface dos 15 aplicativos

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crmplus-quality-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Validar TypeScript
        run: npm run lint

      - name: Gerar site estático
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_BUILD_SHA: quality-audit

      - name: Instalar navegador fixado do agente
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright@1.55.0 install --with-deps chromium

      - name: Iniciar site local isolado
        run: |
          mkdir -p preview/crmplus
          cp -a out/. preview/crmplus/
          python3 -m http.server 4173 -d preview > /tmp/crmplus-quality-server.log 2>&1 &
          for attempt in {1..40}; do
            if curl --fail --silent http://127.0.0.1:4173/crmplus/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/crmplus-quality-server.log
          exit 1

      - name: Executar cenários de processo
        run: node scripts/audit-processes.mjs
        env:
          CRMPLUS_AUDIT_URL: http://127.0.0.1:4173/crmplus

      - name: Executar auditoria visual responsiva
        run: node scripts/audit-visual.mjs
        env:
          CRMPLUS_AUDIT_URL: http://127.0.0.1:4173/crmplus

      - name: Resumir auditoria
        if: always()
        run: |
          {
            echo '## Auditoria CRMPlus+'
            echo
            if [ -f artifacts/process-audit/report.txt ]; then
              echo '### Processos'
              echo '```text'
              cat artifacts/process-audit/report.txt
              echo '```'
            fi
            if [ -f artifacts/visual-audit/report.txt ]; then
              echo '### Interface'
              echo '```text'
              cat artifacts/visual-audit/report.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publicar relatórios como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crmplus-quality-audit
          path: artifacts
          if-no-files-found: warn
